@startuml
entity Pills {
  *Articul(PK) : int
  - -
  Name : string
  Stock : bool
}

entity Order {
  *id(PK) : int
  - -
  *Articul(FK) : int
  Number : int
}

entity Client {
  *id(PK) : int
  - -
  *order_id(FK) : int
  Name : string
}

Order }|..|| Client
Pills }|..|{ Order
@enduml

